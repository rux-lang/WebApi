name: Playground

on:
  push:
    branches:
      - main
    paths:
      - "WebApi/Docker/**"
      - ".github/workflows/playground.yml"
  schedule:
    # Rebuild weekly so the sandbox picks up new Rux compiler releases.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: playground
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rux-playground

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: WebApi/Docker
          file: WebApi/Docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Pull image on server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "docker pull ${{ env.IMAGE }}:latest"
